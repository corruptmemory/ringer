# Generated by `ringer gen-config`.
# Schema + docs come from the config structs (internal/config); copy to your
# config path (default ~/.config/ringer/config.toml, override with --config).

# Default identity stamped into state JSON and eval rows, overridden by --identity / FLEET_IDENTITY / RINGER_IDENTITY / .fleet-agent.
identity_default = "codex-mini"
# Directory holding run state and the eval database. Empty -> ~/.ringer.
state_dir = "~/.ringer"
# Belt-and-suspenders gate: a task with full_access=true still fails unless this is true.
allow_full_access = false

# Log level and output format.
[logging]
# Minimum log level: "debug", "info", "warn", or "error". Default info.
level = "INFO"
# Log output format: "text" or "json". Default text.
format = "text"

# Eval database location.
[eval]
# SQLite eval database path. Empty -> <state_dir>/ringer.db.
db_path = ""

# Zero-LLM HTML artifact rendering (status page, report, index).
[artifact]
# Render zero-LLM HTML artifacts from state. Absent -> true (Python parity); false runs headless.
enabled = true
# Live status page path, re-rendered on every state flush. Supports {run_id}/{run_name}. Default ~/.ringer/artifacts/{run_id}.html.
out = "~/.ringer/artifacts/{run_id}.html"
# Final report path, rendered once when a run finishes. Default ~/.ringer/artifacts/{run_id}-report.html.
report_out = "~/.ringer/artifacts/{run_id}-report.html"
# Multi-run index path listing every run under state_dir. Default ~/.ringer/artifacts/index.html.
index_out = "~/.ringer/artifacts/index.html"

# Overrides for the model scoreboard's identity/notes files.
[scoreboard]
# Override for the model identity registry TOML. Empty -> embedded registry/model-identity.toml.
model_identity_path = ""
# Override for the model judgment notes file. Empty -> embedded docs/MODEL-NOTES.md.
model_notes_path = ""

# Override for the OpenRouter model catalog source.
[catalog]
# OpenRouter model catalog URL. Empty -> the default OpenRouter models endpoint.
source = ""

# Ringside HUD dashboard settings.
[hud]
# HUD port (127.0.0.1). run/demo auto-spawn + probe here. Default 8700 (matches hud.DefaultPort).
port = 8700

# Per-engine spawn config. One [engines.<name>] table per engine.
[engines.codex]
# Path or PATH-resolved name of the engine binary.
bin = "codex"
# Argv template. Placeholders: {taskdir}, {spec}, {access_args}, {engine_args}, {model}.
args_template = ["exec", "--skip-git-repo-check", "{access_args}", "{engine_args}", "-C", "{taskdir}", "{spec}"]
# Args substituted for {access_args} on a sandboxed (non full-access) task.
sandbox_args = ["--sandbox", "workspace-write"]
# Args substituted for {access_args} when the task requests full_access and allow_full_access is set.
full_access_args = ["--dangerously-bypass-approvals-and-sandbox"]
# Regex whose first capture group is the integer token count parsed from engine output.
token_regex = "tokens\\s+used\\s*:?\\s*([0-9][0-9,]*)"
# Model id used for {model} when the task manifest doesn't set one.
model_default = ""
# Linux rootless isolation: "none" (default) or "jail" (per-task user-namespace chroot).
isolation = ""
# Paths bound read-write inside the jail (engine state, e.g. ~/.config/opencode).
jail_state_dirs = []
# Paths bound read-only inside the jail (engine installs outside the host toolchain, e.g. ~/.opencode).
jail_ro_binds = []

# Per-engine spawn config. One [engines.<name>] table per engine.
[engines.opencode]
# Path or PATH-resolved name of the engine binary.
bin = "/home/you/.opencode/bin/opencode"
# Argv template. Placeholders: {taskdir}, {spec}, {access_args}, {engine_args}, {model}.
args_template = ["{taskdir}", "{access_args}", "run", "-m", "{model}", "--dangerously-skip-permissions", "--format", "json", "{engine_args}", "--dir", "{taskdir}", "{spec}"]
# Args substituted for {access_args} on a sandboxed (non full-access) task.
sandbox_args = []
# Args substituted for {access_args} when the task requests full_access and allow_full_access is set.
full_access_args = ["--no-sandbox"]
# Regex whose first capture group is the integer token count parsed from engine output.
token_regex = "\"tokens\":\\{\"total\":([0-9]+)"
# Model id used for {model} when the task manifest doesn't set one.
model_default = "openrouter/z-ai/glm-5.2"
# Linux rootless isolation: "none" (default) or "jail" (per-task user-namespace chroot).
isolation = "jail"
# Paths bound read-write inside the jail (engine state, e.g. ~/.config/opencode).
jail_state_dirs = ["~/.config/opencode", "~/.local/share/opencode"]
# Paths bound read-only inside the jail (engine installs outside the host toolchain, e.g. ~/.opencode).
jail_ro_binds = ["~/.opencode"]
